                async function sleep(n) {
                    return new Promise(resolve => setTimeout(resolve, n));
                }

                async function queryCameraCapabilities(stream, videoElement) {
                    const track = stream.getVideoTracks()[0];
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    capabilities = track.getCapabilities?.();
                    track.stop();
                    videoElement.srcObject = null;
                    await sleep(5000);
                    return capabilities;
                }

                async function getCameras() {
                    const cameras = [];
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    let videoDevices = devices.filter(d => d.kind === 'videoinput');
                    if (videoDevices.length === 0) {
                        alert("No video input devices found.");
                        return [];
                    }
                    if (videoDevices[0].deviceId.trim() === '') {
                        // init first camera
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                facingMode: 'environment'
                            }
                        });
                        capabilities = await queryCameraCapabilities(stream, videoElement);
                    }

                    for (const device of videoDevices) {
                        let capabilities;
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({
                                video: { deviceId: { exact: device.deviceId } }
                            });
                            capabilities = await queryCameraCapabilities(stream, videoElement);
                        } catch (e) {
                            console.log(`Could not access camera ${device.label}:`, e);
                        }
                        cameras.push({
                            deviceId: device.deviceId,
                            label: device.label || `Camera ${cameras.length + 1}`,
                            capabilities
                        });
                    }
                    return cameras;
                }
