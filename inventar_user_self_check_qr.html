<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch QR Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        .video-container {
            position: relative;
            margin: 5% auto;
            max-width: 90vw;
            max-height: 80vh;
            width: fit-content;
            overflow: hidden;
            border-radius: 8px;
        }

        video {
            display: block;
            max-width: 90vw;
            max-height: 80vh;
        }

        #scanDot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(0, 255, 0, 0.3);
            z-index: 10;
            transition: 'background 0.05s';
        }

        #scanDot.flash {
            background: rgba(0, 255, 0, 1);
        }

        /* Scan zone overlay */
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .scan-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 95%;
            /* max-width: 250px; */
            /* aspect-ratio: 1; */
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
        }

        .scan-zone::before,
        .scan-zone::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #00ff00;
        }

        .scan-zone::before {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 12px;
        }

        .scan-zone::after {
            top: -2px;
            right: -2px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: 12px;
        }

        .scan-zone-bottom-left,
        .scan-zone-bottom-right {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #00ff00;
        }

        .scan-zone-bottom-left {
            bottom: -2px;
            left: -2px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: 12px;
        }

        .scan-zone-bottom-right {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 12px;
        }

        ul {
            font-size: 14px;
        }

        #flashlightBtn {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(calc(-50% - 32px));
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 'background 0.2s';
            z-index: 10;
        }

        #flashlightBtn:hover {
            background: #555;
        }

        #detectToggleBtn {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(calc(-50% + 32px));
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #28a745;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 'background 0.2s';
            z-index: 10;
        }

        #detectToggleBtn:hover {
            background: #218838;
        }

        #detectToggleBtn.paused {
            background: #dc3545;
            opacity: 0.5;
        }

        #detectToggleBtn.paused:hover {
            background: #c82333;
        }

        #detectToggleBtn.continuous {
            background: #141cfd;
        }

        #detectToggleBtn.continuous:hover {
            background: #0e13b9;
        }

        #zoomSlider {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            outline: none;
            z-index: 10;
        }

        #zoomSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        #zoomSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        h3 {
            text-align: center;
        }

        .scanned-container {
            margin: 5% auto;
            max-width: 90vw;
            width: fit-content;
            text-align: center;
        }

        .scanned-container ul {
            text-align: center;
            list-style-position: inside;
            padding: 0;
            overflow: hidden;
            list-style: none;
        }

        .scanned-container li {
            margin: 8px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hide {
            display: none;
        }
    </style>
</head>

<body>

    <div id="container" class="video-container hide">
        <video id="video" playsinline muted></video>
        <div class="scan-overlay">
            <div class="scan-zone">
                <div class="scan-zone-bottom-left"></div>
                <div class="scan-zone-bottom-right"></div>
            </div>
        </div>
        <div id="scanDot"></div>
        <button id="flashlightBtn">
            <i class="fa-solid fa-lightbulb"></i>
        </button>
        <button id="detectToggleBtn" class="paused">
            <i class="fa-solid fa-qrcode"></i>
        </button>
        <input type="range" id="zoomSlider" min="1" max="1" step="0.1" value="1">
    </div>
    <h3>Scanned codes</h3>
    <div class="scanned-container">
        <ul id="list"></ul>
    </div>

    <script>
        // Since we cannot use `import`, we will load the library using dynamic import.
        // This is the standard way to use ES modules in a traditional script.
        // The import statement returns a promise, so we use .then() to access the library.
        // Library not available in module
        import('https://unpkg.com/@zxing/library@latest/umd/index.js')
            .then(module => {
                const hints = new Map();
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
                const codeReader = new ZXing.BrowserMultiFormatReader(hints, 5000);
                const scanned = new Set();
                const list = document.getElementById("list");
                const container = document.getElementById("container");
                const videoElement = document.getElementById("video");
                const flashlightBtn = document.getElementById("flashlightBtn");
                const detectToggleBtn = document.getElementById('detectToggleBtn');
                const scanDot = document.getElementById("scanDot");
                const zoomSlider = document.getElementById('zoomSlider');
                const FORCE_ENVIRONMENT_CAMERA = true;
                let flashlightOn = false;
                let detecting = 0;

                async function sleep(n) {
                    return new Promise(resolve => setTimeout(resolve, n));
                }

                async function queryCameraCapabilitiesAndStop(stream, videoElement) {
                    const track = stream.getVideoTracks()[0];
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    // await sleep(5000);
                    capabilities = track.getCapabilities?.();
                    track.stop();
                    videoElement.srcObject = null;
                    // await sleep(5000);
                    return capabilities;
                }

                async function getCameras() {
                    const cameras = [];
                    let devices = await navigator.mediaDevices.enumerateDevices();
                    let videoDevices = devices.filter(d => d.kind === 'videoinput');
                    if (videoDevices.length === 0) {
                        alert("No video input devices found.");
                        return [];
                    }
                    if (videoDevices[0].deviceId.trim() === '') {
                        // init first camera
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                facingMode: 'environment'
                            }
                        });
                        await queryCameraCapabilitiesAndStop(stream, videoElement);
                        devices = await navigator.mediaDevices.enumerateDevices();
                        videoDevices = devices.filter(d => d.kind === 'videoinput');
                    }

                    for (const device of videoDevices) {
                        let capabilities;
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({
                                video: {
                                    deviceId: { exact: device.deviceId },
                                    facingMode: FORCE_ENVIRONMENT_CAMERA ? { exact: 'environment' } : 'environment'
                                }
                            });
                            capabilities = await queryCameraCapabilitiesAndStop(stream, videoElement);
                        } catch (e) {
                            continue;
                            // alert(`Could not access camera ${device.label}:`);
                        }
                        cameras.push({
                            deviceId: device.deviceId,
                            label: device.label || `Camera ${cameras.length + 1}`,
                            capabilities
                        });
                    }
                    // await sleep(5000);
                    return cameras;
                }

                async function init() {

                    const cameras = await getCameras();
                    // alert(JSON.stringify(cameras.map(e => ({ ...e, capabilities: Object.keys(e.capabilities) }))));

                    const backFacing = cameras.filter(d => d.capabilities.facingMode.includes('environment'));
                    // alert(JSON.stringify(backFacing));
                    const withFlash = backFacing.filter(d => d.capabilities.torch != null);
                    // alert(JSON.stringify(withFlash));
                    const selectedDeviceId = (
                        withFlash.length > 0 ? withFlash[0].deviceId : (
                            backFacing.length > 0 ? backFacing[0].deviceId : cameras[0].deviceId
                        )
                    );

                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { deviceId: { exact: selectedDeviceId } }
                    });
                    const track = stream.getVideoTracks()[0];
                    const capabilities = track.getCapabilities();
                    // alert(JSON.stringify(capabilities));

                    await track.applyConstraints({
                        width: { ideal: capabilities.width.max },
                        height: { ideal: capabilities.height.max },
                        resizeMode: { ideal: 'none' },
                        // advanced: [{ zoom: 2 }],
                    });
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    container.classList.remove('hide');
                    // alert(track.id);
                    // alert(JSON.stringify(track.getCapabilities()));

                    // codeReader.decodeFromStream(stream, 'video', (result, err) => {
                    //     scanDot.classList.toggle('flash');
                    //     if (err && err.name !== 'N') {
                    //         console.log(err);
                    //     }
                    //     if (result) {
                    //         const text = result.text;
                    //         if (!scanned.has(text)) {
                    //             scanned.add(text);

                    //             const li = document.createElement("li");
                    //             li.textContent = text;
                    //             list.appendChild(li);

                    //             navigator.vibrate?.(150);
                    //             // new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU").play();
                    //         }
                    //     }
                    // });

                    flashlightBtn.addEventListener('click', async () => {
                        if (track) {
                            try {
                                flashlightOn = !flashlightOn;
                                await track.applyConstraints({
                                    advanced: [{ torch: flashlightOn }]
                                });
                                flashlightBtn.innerHTML = flashlightOn
                                    ? '<i class="fa-solid fa-lightbulb"></i>'
                                    : '<i class="fa-regular fa-lightbulb"></i>';
                                flashlightBtn.style.background = flashlightOn ? '#ffc107' : '#333';
                                flashlightBtn.style.color = flashlightOn ? '#333' : 'white';
                            } catch (e) {
                                // alert('Flashlight nu este disponibil pe acest dispozitiv.');
                                alert(JSON.stringify(track.getCapabilities?.(), null));
                            }
                        }
                    });

                    const setDetecting = d => {
                        switch (d) {
                            case 1:
                                detectToggleBtn.classList.remove('paused');
                                detectToggleBtn.classList.remove('continuous');
                                detecting = 1;
                                break;
                            case 2:
                                detectToggleBtn.classList.remove('paused');
                                detectToggleBtn.classList.add('continuous');
                                detecting = 2;
                                break;
                            default:
                                detectToggleBtn.classList.add('paused');
                                detectToggleBtn.classList.remove('continuous');
                                scanDot.classList.remove('flash');
                                detecting = 0;
                                break;
                        }
                    };

                    detectToggleBtn.addEventListener('click', () => {
                        setDetecting(detecting + 1);
                    });

                    if (capabilities.zoom) {
                        zoomSlider.min = capabilities.zoom.min;
                        zoomSlider.max = capabilities.zoom.max;
                        zoomSlider.step = capabilities.zoom.step || 0.1;
                        zoomSlider.value = capabilities.zoom.min;

                        zoomSlider.addEventListener('input', async () => {
                            try {
                                await track.applyConstraints({
                                    advanced: [{ zoom: parseFloat(zoomSlider.value) }]
                                });
                            } catch (e) {
                                console.error('Zoom error:', e);
                            }
                        });
                    } else {
                        zoomSlider.style.display = 'none';
                    }

                    if (!("BarcodeDetector" in globalThis)) {
                        alert("Barcode Detector is not supported by this browser.");
                    }
                    const barcodeDetector = new BarcodeDetector({
                        formats: ["qr_code"],
                    });
                    while (true) {
                        try {
                            if (detecting) {
                                // create new detector
                                scanDot.classList.toggle('flash');
                                const values = await barcodeDetector.detect(videoElement);
                                for (const v of values.map(v => v.rawValue)) {
                                    if (!scanned.has(v)) {
                                        scanned.add(v);

                                        const li = document.createElement("li");
                                        li.textContent = v;
                                        list.appendChild(li);

                                        // new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU").play();
                                        navigator.vibrate?.(150);
                                        if (detecting === 1) {
                                            setDetecting(0);
                                            break;
                                        }
                                    }
                                }
                            }
                            await sleep(500);
                        } catch (e) {
                            alert(e.name);
                            alert(e.message);
                        }
                    }
                }

                init();

                // Console log all query parameters
                const urlParams = new URLSearchParams(window.location.search);
                for (const [key, value] of urlParams.entries()) {
                    console.log(key, value);
                }
            })
            .catch(error => {
                console.error("Failed to load the scanning library:", error);
            });
    </script>

</body>

</html>
